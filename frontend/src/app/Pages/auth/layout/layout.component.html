<div class="auth-wrapper">
  <!-- Panel izquierdo: formulario -->
  <div class="auth-form-panel">
    <div class="auth-form-body">
      <router-outlet />
    </div>
  </div>

  <!-- Panel derecho: branding -->
  <div class="auth-brand-panel">
    <!-- SVG de fondo -->
    <svg class="brand-bg-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <pattern id="ms-grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#ms-grid)" />
      <!-- Hexágonos decorativos usando coordenadas porcentuales -->
      <polygon
        points="75%,5% 92%,15% 92%,35% 75%,45% 58%,35% 58%,15%"
        fill="none" stroke="rgba(5,150,105,0.15)" stroke-width="1.5"/>
      <polygon
        points="20%,55% 37%,65% 37%,85% 20%,95% 3%,85% 3%,65%"
        fill="none" stroke="rgba(245,158,11,0.12)" stroke-width="1.5"/>
      <polygon
        points="85%,65% 97%,72% 97%,86% 85%,93% 73%,86% 73%,72%"
        fill="none" stroke="rgba(5,150,105,0.10)" stroke-width="1.5"/>
    </svg>

    <!-- Contenido -->
    <div class="brand-content">
      <!-- Logo mark -->
      <div class="brand-logo">
        <div class="brand-logo-mark">
          <div class="brand-logo-outer"></div>
          <div class="brand-logo-inner"></div>
          <div class="brand-logo-icon">
            <i class="pi pi-bolt" style="color: #f59e0b; font-size: 1.375rem;"></i>
          </div>
        </div>
      </div>

      <h1 class="brand-title">Manchita Skills</h1>

      <p class="brand-description">
        Plataforma de gestión de habilidades y competencias.
        Administra usuarios, roles y permisos con precisión.
      </p>

      <!-- Divisor amber -->
      <div class="brand-divider">
        <div class="brand-divider-line"></div>
        <div class="brand-divider-dot"></div>
        <div class="brand-divider-line"></div>
      </div>

      <!-- Feature chips -->
      <div class="brand-chips">
        <span class="brand-chip brand-chip--emerald">Control de acceso</span>
        <span class="brand-chip brand-chip--amber">Roles y permisos</span>
        <span class="brand-chip brand-chip--emerald">Gestión de usuarios</span>
      </div>
    </div>
  </div>
</div>
