<div class="mb-8">
  <h2 class="text-3xl font-bold text-gray-800">Crear Cuenta</h2>
  <p class="text-gray-500 mt-2">Completa el formulario para registrarte.</p>
</div>

<form class="flex flex-col gap-5" (ngSubmit)="onRegister()">
  <div class="flex flex-col gap-2">
    <label for="nombre" class="text-sm font-medium text-gray-700">Nombre completo</label>
    <input pInputText id="nombre" type="text" [(ngModel)]="nombre" name="nombre"
      placeholder="Juan Pérez" class="w-full" />
  </div>

  <div class="flex flex-col gap-2">
    <label for="email" class="text-sm font-medium text-gray-700">Correo electrónico</label>
    <input pInputText id="email" type="email" [(ngModel)]="email" name="email"
      placeholder="correo@ejemplo.com" class="w-full" />
  </div>

  <div class="flex flex-col gap-2">
    <label for="password" class="text-sm font-medium text-gray-700">Contraseña</label>
    <p-password id="password" [(ngModel)]="password" name="password"
      placeholder="Mínimo 6 caracteres" [toggleMask]="true"
      styleClass="w-full" inputStyleClass="w-full" />
  </div>

  <div class="flex flex-col gap-2">
    <label for="confirmPassword" class="text-sm font-medium text-gray-700">Confirmar contraseña</label>
    <p-password id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword"
      placeholder="Repite tu contraseña" [feedback]="false" [toggleMask]="true"
      styleClass="w-full" inputStyleClass="w-full" />
  </div>

  <p-button type="submit" label="Registrarse" icon="pi pi-user-plus"
    styleClass="w-full" [loading]="loading()" (onClick)="onRegister()" />
</form>

<div class="mt-6 text-center text-sm text-gray-500">
  ¿Ya tienes cuenta?
  <a routerLink="/auth/login" class="text-emerald-600 hover:text-emerald-700 font-medium ml-1">
    Inicia sesión
  </a>
</div>
