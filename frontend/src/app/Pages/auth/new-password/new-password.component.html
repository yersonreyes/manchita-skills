@if (!success()) {
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Nueva Contraseña</h2>
    <p class="text-gray-500 mt-2">Ingresa y confirma tu nueva contraseña.</p>
  </div>

  <form class="flex flex-col gap-5" (ngSubmit)="onSave()">
    <div class="flex flex-col gap-2">
      <label for="newPassword" class="text-sm font-medium text-gray-700">Nueva contraseña</label>
      <p-password id="newPassword" [(ngModel)]="newPassword" name="newPassword"
        placeholder="Mínimo 6 caracteres" [toggleMask]="true"
        styleClass="w-full" inputStyleClass="w-full" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="confirmPassword" class="text-sm font-medium text-gray-700">Confirmar contraseña</label>
      <p-password id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword"
        placeholder="Repite la contraseña" [feedback]="false" [toggleMask]="true"
        styleClass="w-full" inputStyleClass="w-full" />
    </div>

    <p-button type="submit" label="Guardar contraseña" icon="pi pi-lock"
      styleClass="w-full" [loading]="loading()" (onClick)="onSave()" />
  </form>
} @else {
  <div class="text-center">
    <i class="pi pi-check-circle text-5xl text-emerald-500 mb-4 block"></i>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Contraseña actualizada!</h2>
    <p class="text-gray-500">Serás redirigido al inicio de sesión en unos segundos...</p>
  </div>
}

<div class="mt-6 text-center text-sm">
  <a routerLink="/auth/login" class="text-emerald-600 hover:text-emerald-700 font-medium">
    ← Volver al inicio de sesión
  </a>
</div>
