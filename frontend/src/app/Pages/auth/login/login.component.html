<div class="mb-8">
  <h2 class="text-3xl font-bold text-gray-800">Iniciar Sesión</h2>
  <p class="text-gray-500 mt-2">Bienvenido de vuelta. Ingresa tus credenciales.</p>
</div>

<form class="flex flex-col gap-5" (ngSubmit)="onLogin()">
  <!-- Email -->
  <div class="flex flex-col gap-2">
    <label for="email" class="text-sm font-medium text-gray-700">
      Correo electrónico
    </label>
    <input
      pInputText
      id="email"
      type="email"
      [(ngModel)]="email"
      name="email"
      placeholder="correo@ejemplo.com"
      class="w-full"
      autocomplete="email"
    />
  </div>

  <!-- Contraseña -->
  <div class="flex flex-col gap-2">
    <label for="password" class="text-sm font-medium text-gray-700">
      Contraseña
    </label>
    <p-password
      id="password"
      [(ngModel)]="password"
      name="password"
      placeholder="••••••••"
      [feedback]="false"
      [toggleMask]="true"
      styleClass="w-full"
      inputStyleClass="w-full"
      autocomplete="current-password"
    />
    <a
      routerLink="/auth/recover-password"
      class="text-sm text-green-600 hover:text-green-700 self-end cursor-pointer"
    >
      ¿Olvidaste tu contraseña?
    </a>
  </div>

  <!-- Botón -->
  <p-button
    type="submit"
    label="Iniciar Sesión"
    icon="pi pi-sign-in"
    styleClass="w-full"
    [loading]="loading()"
    (onClick)="onLogin()"
  />
</form>

<!-- Link a registro -->
<div class="mt-6 text-center text-sm text-gray-500">
  ¿No tienes cuenta?
  <a routerLink="/auth/register" class="text-green-600 hover:text-green-700 font-medium ml-1">
    Regístrate
  </a>
</div>
