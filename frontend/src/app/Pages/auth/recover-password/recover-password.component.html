@if (!sent()) {
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Recuperar Contraseña</h2>
    <p class="text-gray-500 mt-2">Ingresa tu correo y te enviaremos un enlace de recuperación.</p>
  </div>

  <form class="flex flex-col gap-5" (ngSubmit)="onSend()">
    <div class="flex flex-col gap-2">
      <label for="email" class="text-sm font-medium text-gray-700">Correo electrónico</label>
      <input pInputText id="email" type="email" [(ngModel)]="email" name="email"
        placeholder="correo@ejemplo.com" class="w-full" />
    </div>

    <p-button type="submit" label="Enviar enlace" icon="pi pi-envelope"
      styleClass="w-full" [loading]="loading()" (onClick)="onSend()" />
  </form>
} @else {
  <div class="text-center">
    <i class="pi pi-check-circle text-5xl text-emerald-500 mb-4 block"></i>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Correo enviado!</h2>
    <p class="text-gray-500">
      Si el correo <strong>{{ email }}</strong> está registrado,
      recibirás un enlace para restablecer tu contraseña.
    </p>
  </div>
}

<div class="mt-6 text-center text-sm">
  <a routerLink="/auth/login" class="text-emerald-600 hover:text-emerald-700 font-medium">
    ← Volver al inicio de sesión
  </a>
</div>
