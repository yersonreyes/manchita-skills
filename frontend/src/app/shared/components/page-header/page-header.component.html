<div class="page-header flex flex-wrap items-start justify-between gap-4 mb-6">
  <div class="min-w-0 flex-1">
    @if (breadcrumbs().length > 0) {
      <nav class="flex items-center gap-1.5 text-xs text-stone-500 mb-2" aria-label="Breadcrumb">
        @for (crumb of breadcrumbs(); track crumb.label; let last = $last) {
          @if (crumb.link && !last) {
            <a
              [routerLink]="crumb.link"
              class="hover:text-emerald-700 transition-colors font-medium"
            >{{ crumb.label }}</a>
          } @else {
            <span [class.text-stone-700]="last" [class.font-medium]="last">{{ crumb.label }}</span>
          }
          @if (!last) {
            <i class="pi pi-angle-right text-[10px] text-stone-400"></i>
          }
        }
      </nav>
    }
    <h1 class="page-header__title font-display text-2xl md:text-3xl font-semibold text-stone-900 tracking-tight">
      {{ title() }}
    </h1>
    @if (subtitle()) {
      <p class="page-header__subtitle text-stone-600 mt-1 text-sm md:text-base max-w-2xl">
        {{ subtitle() }}
      </p>
    }
  </div>
  <div class="flex items-center gap-2 shrink-0">
    <ng-content />
  </div>
</div>
