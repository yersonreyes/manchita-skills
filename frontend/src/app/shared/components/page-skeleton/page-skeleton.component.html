@switch (variant()) {
  @case ('table') {
    <div class="surface-card overflow-hidden">
      <div class="px-5 py-4 border-b border-stone-200 flex items-center gap-3">
        <p-skeleton width="14rem" height="1.25rem" />
        <p-skeleton width="8rem" height="1.25rem" styleClass="ml-auto" />
      </div>
      <div class="divide-y divide-stone-100">
        @for (_ of rowList(); track $index) {
          <div class="px-5 py-4 flex items-center gap-4">
            <p-skeleton shape="circle" size="2rem" />
            <div class="flex-1 space-y-2">
              <p-skeleton width="40%" height="0.875rem" />
              <p-skeleton width="65%" height="0.75rem" />
            </div>
            <p-skeleton width="5rem" height="1.75rem" />
          </div>
        }
      </div>
    </div>
  }
  @case ('cards') {
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      @for (_ of rowList(); track $index) {
        <div class="surface-card p-5 space-y-3">
          <div class="flex items-center gap-3">
            <p-skeleton shape="circle" size="2.5rem" />
            <div class="flex-1 space-y-2">
              <p-skeleton width="70%" height="0.875rem" />
              <p-skeleton width="40%" height="0.75rem" />
            </div>
          </div>
          <p-skeleton width="100%" height="0.75rem" />
          <p-skeleton width="85%" height="0.75rem" />
          <div class="flex gap-2 pt-2">
            <p-skeleton width="4rem" height="1.5rem" />
            <p-skeleton width="4rem" height="1.5rem" />
          </div>
        </div>
      }
    </div>
  }
  @case ('detail') {
    <div class="space-y-6">
      <div class="surface-card p-6 space-y-3">
        <p-skeleton width="60%" height="1.75rem" />
        <p-skeleton width="90%" height="0.875rem" />
        <p-skeleton width="80%" height="0.875rem" />
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        @for (_ of rowList(); track $index) {
          <div class="surface-card p-5 space-y-3">
            <p-skeleton width="40%" height="1rem" />
            <p-skeleton width="100%" height="0.75rem" />
            <p-skeleton width="85%" height="0.75rem" />
          </div>
        }
      </div>
    </div>
  }
}
